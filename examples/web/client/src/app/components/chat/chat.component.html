<div class="flex flex-col h-[calc(100vh-8rem)] max-w-4xl mx-auto">
  <div class="flex-1 overflow-y-auto mb-4 space-y-4 p-4 bg-gray-50 rounded-lg shadow-inner border border-gray-200">
    @for (msg of messages; track $index) {
      <div [class]="'flex ' + (msg.sender === 'user' ? 'justify-end' : 'justify-start')">
        <div [class]="'max-w-[80%] p-3 rounded-2xl ' + 
          (msg.sender === 'user' ? 'bg-indigo-600 text-white rounded-br-none shadow-md' : 
           msg.sender === 'ai' ? 'bg-white border border-gray-200 text-gray-800 rounded-bl-none shadow-sm' : 
           'bg-red-50 text-red-700 text-xs italic mx-auto border border-red-100 px-4')">
          {{ msg.text }}
        </div>
      </div>
    }
    @if (messages.length === 0) {
      <div class="flex flex-col items-center justify-center h-full text-gray-400 space-y-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 opacity-20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
        </svg>
        <p>Start a conversation with HaaS AI...</p>
      </div>
    }
  </div>

  <div class="flex gap-2 bg-white p-2 rounded-xl shadow-lg border border-gray-100">
    <input 
      type="text" 
      [(ngModel)]="newMessage" 
      (keyup.enter)="sendMessage()"
      placeholder="Type your message..." 
      class="flex-1 p-3 border-none focus:ring-0 text-gray-700 placeholder-gray-400"
    />
    <button 
      (click)="sendMessage()" 
      [disabled]="!newMessage.trim()"
      class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 transition-all font-medium disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2"
    >
      <span>Send</span>
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
      </svg>
    </button>
  </div>
</div>
