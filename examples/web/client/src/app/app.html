<div class="flex h-screen bg-gray-100 font-sans antialiased text-gray-900">
  <!-- Sidebar -->
  <aside class="w-64 bg-indigo-900 text-indigo-100 flex flex-col shadow-xl">
    <div class="p-6">
      <h1 class="text-2xl font-bold text-white flex items-center gap-2">
        <span class="bg-indigo-500 p-1.5 rounded-lg">AI</span>
        <span>HaaS Hub</span>
      </h1>
      <p class="text-xs text-indigo-300 mt-1 uppercase tracking-widest font-semibold">Enterprise AI Examples</p>
    </div>

    <nav class="flex-1 px-4 py-4 space-y-1">
      <a routerLink="/chat" routerLinkActive="bg-indigo-800 text-white" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-indigo-800 transition-colors group">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-70 group-hover:opacity-100" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
        </svg>
        <span class="font-medium">AI Chat</span>
      </a>
      <a routerLink="/tictactoe" routerLinkActive="bg-indigo-800 text-white" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-indigo-800 transition-colors group opacity-50 cursor-not-allowed">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-70 group-hover:opacity-100" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
        </svg>
        <span class="font-medium">Tic-Tac-Toe</span>
      </a>
    </nav>

    <div class="p-4 bg-indigo-950/50 mt-auto">
      <div class="flex items-center gap-3 px-2 py-2">
        <div class="h-8 w-8 rounded-full bg-indigo-500 flex items-center justify-center text-xs font-bold text-white shadow-inner">
          U
        </div>
        <div class="text-sm">
          <p class="font-semibold text-white leading-none">Guest User</p>
          <p class="text-xs text-indigo-400 mt-1">Local Session</p>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 flex flex-col overflow-hidden">
    <!-- Header -->
    <header class="bg-white border-b border-gray-200 h-16 flex items-center px-8 shadow-sm">
      <h2 class="text-lg font-semibold text-gray-800">
        @if (isRouteActive('/chat')) { AI Chat }
        @else if (isRouteActive('/tictactoe')) { Tic-Tac-Toe }
        @else { Welcome }
      </h2>
    </header>

    <!-- Content Area -->
    <section class="flex-1 overflow-auto p-8">
      <router-outlet />
    </section>
  </main>
</div>
